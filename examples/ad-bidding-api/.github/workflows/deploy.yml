name: Deploy ad-bidding-api

on:
  pull_request:
    branches: [main]
    paths:
      - "examples/ad-bidding-api/**"
  push:
    branches: [main]
    paths:
      - "examples/ad-bidding-api/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  SA_EMAIL: ${{ vars.SA_EMAIL }}
  WORKING_DIR: examples/ad-bidding-api

jobs:
  plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Validate YAML config
        run: python3 -c "import yaml; yaml.safe_load(open('${{ env.WORKING_DIR }}/service.yaml'))"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -out=tfplan -no-color

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Get Service URL
        id: url
        working-directory: ${{ env.WORKING_DIR }}
        run: echo "url=$(terraform output -raw service_url)" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${{ steps.url.outputs.url }}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
